services:
  web:
    build: .
    ports:
      - "3000:80"
    environment:
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - RAILS_ENV=production
    volumes:
      - sqlite_data:/rails/storage
    depends_on:
      - db

  db:
    image: alpine:latest
    volumes:
      - sqlite_data:/data

volumes:
  sqlite_data: